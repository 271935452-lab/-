<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>原型导航首页</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --sub: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .page {
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .sub {
      margin: 0 0 16px;
      color: var(--sub);
      font-size: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    .links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
    }
    @media (max-width: 760px) {
      .links { grid-template-columns: 1fr; }
    }
    a {
      color: var(--primary);
      text-decoration: none;
      padding: 6px 0;
      border-bottom: 1px dashed #dbeafe;
      font-size: 14px;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="page">
    <h1>头程项目原型导航</h1>
    <p class="sub">分享链接后默认打开此页，点击进入各原型页面。</p>

    <section class="card">
      <h2>常用页面</h2>
      <div class="links">
        <a href="月度提成归档与运单明细-MVP.html">月底归档与运单底表</a>
        <a href="表外导入成本列表-MVP.html">月度调整表</a>
        <a href="导入表外成本弹窗页-MVP.html">导入表外成本</a>
        <a href="导入绩效系数弹窗页-MVP.html">导入绩效系数</a>
        <a href="人员映射表-MVP.html">人员映射表</a>
        <a href="批量导入人员映射-MVP.html">批量导入人员映射</a>
        <a href="新增人员映射-MVP.html">新增人员映射</a>
        <a href="编辑人员映射-MVP.html">编辑人员映射</a>
      </div>
    </section>

    <section class="card">
      <h2>其他页面</h2>
      <div class="links">
        <a href="引用规则包-独立弹窗页-MVP.html">引用规则包（弹窗页）</a>
        <a href="客户账号锁定与解锁申请-APP页面.html">客户账号锁定与解锁申请（APP）</a>
      </div>
    </section>
  </main>
</body>
</html>
