<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新建工单（MVP）</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #fff;
      --text: #111827;
      --sub: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --blue-bg: #eff6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }
    .page { max-width: 900px; margin: 0 auto; padding: 20px 16px 80px; }
    .crumb { font-size: 12px; color: var(--sub); margin-bottom: 8px; }
    .crumb a { color: var(--primary); text-decoration: none; }
    .top { margin-bottom: 16px; }
    .top h1 { margin: 0 0 6px; font-size: 22px; font-weight: 700; }
    .meta { font-size: 13px; color: var(--sub); margin: 0; line-height: 1.55; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 12px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
    }
    .sec-title {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 14px;
      padding: 8px 10px;
      border-radius: 8px;
      border-left: 4px solid var(--primary);
      background: var(--blue-bg);
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 20px;
    }
    @media (max-width: 720px) { .form-grid { grid-template-columns: 1fr; } }
    .field-full { grid-column: 1 / -1; }
    .field label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 6px; }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      font-family: inherit;
    }
    .field textarea { min-height: 100px; resize: vertical; }
    .hint { font-size: 12px; color: #94a3b8; margin-top: 6px; line-height: 1.5; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
    .btn {
      border: 1px solid var(--line);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      background: #fff;
    }
    .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .check-line {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f8fafc;
      margin-top: 8px;
    }
    .check-line input { margin-top: 3px; }
    .scene-hint {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      font-size: 12px;
      color: #92400e;
      line-height: 1.6;
      display: none;
    }
    .scene-hint.show { display: block; }
  </style>
</head>
<body>
  <div class="page">
    <div class="crumb"><a href="原型导航-工单模块.html">工单模块</a> / <a href="工单工作台-MVP.html">工作台</a> / 新建</div>
    <div class="top">
      <h1>新建工单</h1>
      <p class="meta">默认发起人：当前登录人（业务员 / 产品）；港前拆柜前找付雪，港后按私卡 / FBA / 自提分流，异常件与费用结案单独归类。货接回需改渠道时请勾选通知<strong>配仓组</strong>；涉及改原单费用时请补充原单号与差异说明。</p>
    </div>

    <div class="card">
      <div class="sec-title">基础信息</div>
      <div class="form-grid">
        <div class="field field-full">
          <label for="title">工单标题 <span style="color:#dc2626">*</span></label>
          <input id="title" placeholder="例：EMSU1234567 拦截+换标+预报海外仓" />
        </div>
        <div class="field">
          <label for="stage">阶段 <span style="color:#dc2626">*</span></label>
          <select id="stage">
            <option value="港前">港前（柜子计划 / 拆柜前）</option>
            <option value="港后">港后（私卡 / FBA / 自提 / 转派）</option>
            <option value="尾端">尾端（未上架索赔等）</option>
          </select>
        </div>
        <div class="field">
          <label for="scene">业务场景 <span style="color:#dc2626">*</span></label>
          <select id="scene">
            <optgroup label="港前">
              <option value="港前·拆柜前找付雪">港前：拆柜前找付雪</option>
              <option value="港前·柜子计划拦截换标">港前：柜子计划 / 拦截 / 换标 / 共享表 / 预报海外仓</option>
              <option value="港前·拆柜报告异常">港前：拆柜报告异常</option>
            </optgroup>
            <optgroup label="港后 - 私卡客服">
              <option value="港后·私卡改地址">港后私卡：改地址 / 改收件信息</option>
              <option value="港后·私卡预约联系不上">港后私卡：预约联系不上 / 反向工单</option>
              <option value="港后·私卡改尾端方式">港后私卡：改尾端派送方式</option>
            </optgroup>
            <optgroup label="港后 - FBA 客服">
              <option value="港后·FBA改仓">港后FBA：改仓 / 改发货渠道</option>
              <option value="港后·FBA改原单费用">港后FBA：改原单费用</option>
              <option value="港后·FBA尾端派送">港后FBA：尾端派送方式调整</option>
            </optgroup>
            <optgroup label="港后 - 自提客服">
              <option value="港后·自提单卡派转自提">港后自提：单卡派转自提</option>
              <option value="港后·自提到仓提货">港后自提：到仓提货 / 回执确认</option>
            </optgroup>
            <optgroup label="尾端">
              <option value="尾端·未上架索赔">尾端：未上架索赔</option>
            </optgroup>
            <optgroup label="异常件">
              <option value="异常件·媒体区断更">异常件：业务媒体区断更</option>
              <option value="异常件·预约联系不上">异常件：海外仓预约货联系不上</option>
            </optgroup>
            <optgroup label="费用结案">
              <option value="费用结案·改原单费用">费用结案：改原单费用</option>
            </optgroup>
          </select>
          <div id="sceneHint" class="scene-hint"></div>
        </div>
        <div class="field">
          <label for="cust">客户 / 项目</label>
          <input id="cust" placeholder="选填" />
        </div>
        <div class="field">
          <label for="ref">关联单号（柜号 / 运单 / FBA）</label>
          <input id="ref" placeholder="EMSU… / 国内运单 / Reference ID" />
        </div>
        <div class="field field-full">
          <label for="body">问题描述 / 指令说明 <span style="color:#dc2626">*</span></label>
          <textarea id="body" placeholder="说明诉求、截止时间、是否已企微同步付雪或客服"></textarea>
          <div class="hint">未上架类：请说明已收集的客户未上架截图、ASIN、到仓时间等，便于一次性转亚马逊客服与海外仓。</div>
        </div>
        <div class="field field-full">
          <label for="files">附件</label>
          <input id="files" type="file" multiple />
          <div class="hint">支持截图、标签样例、拆柜照片、客户邮件等。</div>
        </div>
        <div class="field-full">
          <div class="check-line">
            <input type="checkbox" id="notifyWh" />
            <label for="notifyWh" style="margin:0;font-size:13px;color:var(--text);cursor:pointer;">
              <strong>货已接回 / 改发货渠道</strong>：同步通知<strong>配仓组</strong>（系统消息 + 可选钉群/企微机器人）
            </label>
          </div>
        </div>
      </div>
      <div class="actions">
        <button type="button" class="btn btn-primary">提交工单</button>
        <a class="btn" href="工单工作台-MVP.html" style="text-decoration:none;display:inline-block;line-height:1.2">取消</a>
      </div>
    </div>
  </div>
  <script>
    const hintEl = document.getElementById("sceneHint");
    const sceneHints = {
      "港前·拆柜前找付雪": "业务员先在企业微信同步付雪，付雪在系统里接收或驳回；通过后再进入拦截、换标、共享表与海外仓预报流程。",
      "港前·柜子计划拦截换标": "对应柜子计划场景，需记录拦截原因、换标要求、共享表更新人和海外仓预报结果。",
      "港前·拆柜报告异常": "收到海外仓拆柜报告后 24h 内反馈少件/破损；可生成月度异常分析视图（原型后续）。",
      "港后·私卡改地址": "私卡客服接单后确认地址、线路与客户诉求；如需转派再分流到后续客服。",
      "港后·私卡预约联系不上": "私卡客服发起反向工单至港后客服池，由客服回电客户或销售协同。",
      "港后·私卡改尾端方式": "若涉及入仓后改渠道，勾选「通知配仓组」避免库存与出仓指令冲突。",
      "港后·FBA改仓": "FBA 客服处理改仓、改发货渠道或仓内指令；涉及出仓需同步配仓组。",
      "港后·FBA改原单费用": "原单费用调整需记录原因、原单号、差异金额与复核人；提交后流转财务确认。",
      "港后·FBA尾端派送": "FBA 客服调整尾端派送方式时，需要明确新渠道、时效与回执要求。",
      "港后·自提单卡派转自提": "自提客服处理单卡派转自提，系统留痕转派人与接单人。",
      "港后·自提到仓提货": "自提客服确认到仓提货信息与回执，必要时同步客户补充资料。",
      "尾端·未上架索赔": "流程：业务提交客户未上架截图与资料 → 亚马逊客服接收 → 线下找海外仓 → 3 日内海外仓反馈 → 核实 → 索赔 → 财务结案。",
      "异常件·媒体区断更": "接收后 12h 内开查并记录官网反馈时间；系统按周提醒跟进，第 6 天未闭环则标红待跟进，业务员或刘奎林可发起。",
      "异常件·预约联系不上": "海外仓预约货联系人联系不上时，私卡客服发起反向工单并持续追踪回电结果。",
      "费用结案·改原单费用": "原单费用调整需记录原单号、差异金额、原因与复核人，完成财务确认后再结案。",
    };
    function updateHint() {
      const v = document.getElementById("scene").value;
      const t = sceneHints[v];
      if (t) {
        hintEl.textContent = t;
        hintEl.classList.add("show");
      } else {
        hintEl.classList.remove("show");
      }
    }
    document.getElementById("scene").addEventListener("change", updateHint);
    updateHint();
  </script>
</body>
</html>
