<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>客户账号财务解锁</title>
  <style>
    :root {
      --bg: #f3f6ff;
      --card: #ffffff;
      --text: #0f172a;
      --sub: #64748b;
      --line: #e2e8f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --warn: #f59e0b;
      --danger: #ef4444;
      --ok: #16a34a;
      --ok-bg: #ecfdf3;
      --warn-bg: #fff8e6;
      --danger-bg: #fef2f2;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #e8efff 0%, var(--bg) 40%, #eef2ff 100%);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 14px 10px 30px;
    }

    .phone {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid #dbe4ff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.12);
      backdrop-filter: blur(8px);
    }

    .topbar {
      background: linear-gradient(120deg, #2563eb 0%, #1d4ed8 100%);
      color: #fff;
      padding: 14px 16px 18px;
    }

    .topbar .small {
      font-size: 12px;
      opacity: 0.9;
      margin-bottom: 6px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.2px;
    }

    .content {
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 3px 12px rgba(15, 23, 42, 0.04);
      padding: 12px;
    }

    .card-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }

    .card-title h2 {
      margin: 0;
      font-size: 15px;
    }

    .meta {
      font-size: 12px;
      color: var(--sub);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .tag-active {
      color: #166534;
      background: var(--ok-bg);
      border-color: #86efac;
    }

    .tag-locked {
      color: #92400e;
      background: var(--warn-bg);
      border-color: #fcd34d;
    }

    .tag-pending {
      color: #991b1b;
      background: var(--danger-bg);
      border-color: #fca5a5;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .kv {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fbfdff;
    }

    .kv .k {
      color: var(--sub);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .kv .v {
      font-size: 14px;
      font-weight: 600;
    }

    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--sub);
    }

    select, input[type="text"], input[type="datetime-local"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    select:focus, input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      font-weight: 600;
    }

    .btn-primary:hover { background: var(--primary-hover); }

  </style>
</head>
<body>
  <main class="phone">
    <header class="topbar">
      <div class="small">客户中心 / 财务风控</div>
      <h1>客户账号财务解锁</h1>
    </header>

    <section class="content">
      <article class="card">
        <div class="card-title">
          <h2>客户查询</h2>
          <span class="meta">按客户名称筛选</span>
        </div>
        <div class="search-row">
          <div class="field">
            <label for="customerKeyword">客户名称</label>
            <input id="customerKeyword" type="text" placeholder="请输入客户名称或者客户代码" />
          </div>
          <button class="btn btn-primary" id="searchBtn">搜索</button>
        </div>
      </article>

      <article class="card">
        <div class="card-title">
          <h2>客户账号状态</h2>
          <span class="tag tag-locked" id="accountStatusTag">已锁定</span>
        </div>
        <div class="grid-2">
          <div class="kv">
            <div class="k">客户名称</div>
            <div class="v">深圳华拓科技有限公司</div>
          </div>
          <div class="kv">
            <div class="k">客户编号</div>
            <div class="v">KH-2026-0198</div>
          </div>
          <div class="kv">
            <div class="k">当前业务员</div>
            <div class="v">李思远</div>
          </div>
          <div class="kv">
            <div class="k">锁账时间</div>
            <div class="v" id="statusUpdatedAt">2026-04-24 09:10</div>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card-title">
          <h2>财务解锁处理</h2>
        </div>
        <div class="field">
          <label for="effectiveAt">解锁到期时间</label>
          <input id="effectiveAt" type="datetime-local" />
        </div>
        <div class="btn-row">
          <button class="btn" id="resetBtn">重置</button>
          <button class="btn btn-primary" id="submitBtn">确认解锁</button>
        </div>
      </article>
    </section>
  </main>

  <script>
    const customerKeyword = document.getElementById("customerKeyword");
    const searchBtn = document.getElementById("searchBtn");
    const effectiveAt = document.getElementById("effectiveAt");
    const submitBtn = document.getElementById("submitBtn");
    const resetBtn = document.getElementById("resetBtn");
    const accountStatusTag = document.getElementById("accountStatusTag");
    const statusUpdatedAt = document.getElementById("statusUpdatedAt");

    function nowText() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
    }

    function setUnlockedStatus() {
      accountStatusTag.className = "tag";
      accountStatusTag.classList.add("tag-active");
      accountStatusTag.textContent = "正常使用";
      statusUpdatedAt.textContent = nowText();
    }

    searchBtn.addEventListener("click", function () {
      const keyword = customerKeyword.value.trim();
      if (!keyword) {
        alert("请输入客户名称");
        return;
      }
      alert("已按客户名称搜索：" + keyword + "（当前为原型页面演示）");
    });

    submitBtn.addEventListener("click", function () {
      const eff = effectiveAt.value.trim();

      if (!eff) {
        alert("请选择解锁到期时间");
        return;
      }

      setUnlockedStatus();
      alert("解锁已完成。");
    });

    resetBtn.addEventListener("click", function () {
      effectiveAt.value = "";
    });
  </script>
</body>
</html>
